gcp.resourceLocations:
  rules:
   - allow:
       values:
       - "in:us-west2-locations"
       - "in:us-west4-locations"
       - "in:us-central1-locations"

compute.skipDefaultNetworkCreation:
  rules:
    - enforce: true

storage.publicAccessPrevention:
  rules:
    - enforce: true

storage.uniformBucketLevelAccess:
  rules:
    - enforce: true